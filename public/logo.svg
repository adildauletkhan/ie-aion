<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0c1f6b"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="centerGlow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#93c5fd"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>

  <!-- Outer subtle ring -->
  <circle cx="16" cy="16" r="12" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>

  <!-- Three orbital ellipses — integration symbol -->
  <ellipse cx="16" cy="16" rx="10.5" ry="4.5"
    fill="none" stroke="rgba(255,255,255,0.38)" stroke-width="1.4"
    stroke-linecap="round"/>
  <ellipse cx="16" cy="16" rx="10.5" ry="4.5"
    fill="none" stroke="rgba(255,255,255,0.38)" stroke-width="1.4"
    stroke-linecap="round"
    transform="rotate(60 16 16)"/>
  <ellipse cx="16" cy="16" rx="10.5" ry="4.5"
    fill="none" stroke="rgba(255,255,255,0.38)" stroke-width="1.4"
    stroke-linecap="round"
    transform="rotate(-60 16 16)"/>

  <!-- Centre node outer glow -->
  <circle cx="16" cy="16" r="4.5" fill="rgba(255,255,255,0.15)"/>
  <!-- Centre node -->
  <circle cx="16" cy="16" r="3.2" fill="url(#centerGlow)"/>
  <!-- Centre inner dot -->
  <circle cx="16" cy="16" r="1.4" fill="#1e40af"/>
</svg>
