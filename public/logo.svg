<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#0d2a2a"/>
    </linearGradient>
    <linearGradient id="boltGrad" x1="14" y1="3" x2="18" y2="29" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FACC15"/>
      <stop offset="55%" stop-color="#5CE0D6"/>
      <stop offset="100%" stop-color="#0d9488"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="1.4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>

  <!-- Outer ring accent -->
  <circle cx="16" cy="16" r="13" fill="none" stroke="rgba(92,224,214,0.12)" stroke-width="1"/>

  <!-- Lightning bolt -->
  <polygon
    points="18,3 10,18 15.5,18 14,29 22,14 16.5,14"
    fill="url(#boltGrad)"
    filter="url(#glow)"
  />
</svg>
