<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0c1f6b"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>

  <!-- Three orbital ellipses  bolder for favicon legibility -->
  <ellipse cx="16" cy="16" rx="10" ry="4.5"
    fill="none" stroke="rgba(255,255,255,0.55)" stroke-width="2"
    stroke-linecap="round"/>
  <ellipse cx="16" cy="16" rx="10" ry="4.5"
    fill="none" stroke="rgba(255,255,255,0.55)" stroke-width="2"
    stroke-linecap="round" transform="rotate(60 16 16)"/>
  <ellipse cx="16" cy="16" rx="10" ry="4.5"
    fill="none" stroke="rgba(255,255,255,0.55)" stroke-width="2"
    stroke-linecap="round" transform="rotate(-60 16 16)"/>

  <!-- Centre node -->
  <circle cx="16" cy="16" r="4" fill="white"/>
  <circle cx="16" cy="16" r="2" fill="#1e40af"/>
</svg>
