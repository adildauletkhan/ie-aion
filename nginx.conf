upstream backend {
    server capacity-navigator-production.up.railway.app:443;
    keepalive 32;
}

server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy API requests to Railway backend (HTTPS public URL)
    location /api/ {
        proxy_pass https://capacity-navigator-production.up.railway.app;
        proxy_ssl_server_name on;
        proxy_http_version 1.1;
        proxy_set_header Host capacity-navigator-production.up.railway.app;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 15s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # Proxy WebSocket to Railway backend
    location /ws/ {
        proxy_pass https://capacity-navigator-production.up.railway.app;
        proxy_ssl_server_name on;
        proxy_http_version 1.1;
        proxy_set_header Host capacity-navigator-production.up.railway.app;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # SPA routing - all other routes go to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
